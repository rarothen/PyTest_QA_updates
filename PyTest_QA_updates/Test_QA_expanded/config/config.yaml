testing:
  sampling:
    measurements_count: 10 #NULL
    total_duration_seconds: 2 #NULL
    sampling_frequency_hz: NULL

ammeters:
 greenlee:
   port: 5000
   command: "MEASURE_GREENLEE -get_measurement"
 entes:
   port: 5001
   command: "MEASURE_ENTES -get_data"
 circutor:
   port: 5002
   command: "MEASURE_CIRCUTOR -get_measurement -current"

analysis:
  statistical_metrics:
    mean: true
    median: true
    std: true
    min: true
    max: true
  visualization:
    enabled: true
    plot_types:
      - histogram
result_management: 
  save_results: true
  repository_path: "results/"
